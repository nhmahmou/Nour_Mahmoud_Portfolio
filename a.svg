      <stop offset="0%" stop-color="#1DE9B6" stop-opacity="0.7" />
      <stop offset="40%" stop-color="#1DE9B6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#1DE9B6" stop-opacity="0" />
    </radialGradient>

    <!-- Pink glow -->
    <radialGradient id="pinkGlow" cx="75%" cy="55%" r="0.7">
      <stop offset="0%" stop-color="#FF6EA8" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#FF6EA8" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#FF6EA8" stop-opacity="0" />
    </radialGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070D26" />
      <stop offset="100%" stop-color="#050716" />
