<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prog 4: Texture and Transparency</title>
  <link type="text/css" rel="stylesheet" href="rasterize.css">
  <script type="text/javascript" src="gl-matrix.js"></script>
  <script type="text/javascript" src="rasterize.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; width: 100%; height: 100vh; }
    #canvas-wrap { position: relative; width: 512px; height: 512px; max-width: 100vw; max-height: 100vh; opacity:0; transition:opacity .35s; }
  </style>
</head>
<body onload="main();requestAnimationFrame(function(){requestAnimationFrame(function(){toggleMinecraft();var w=document.getElementById('canvas-wrap');w.style.opacity='1';});});">
  <div id="canvas-wrap">
    <canvas id="myImageCanvas" width="512" height="512"></canvas>
    <canvas id="myWebGLCanvas" width="512" height="512"></canvas>
  </div>
</body>
</html>
