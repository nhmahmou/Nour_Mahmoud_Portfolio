<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Prog 5: Battlezone</title>
    <link type="text/css" rel="stylesheet" href="rasterize.css">
    <script type="text/javascript" src="gl-matrix.js"></script>
    <script type="text/javascript" src="rasterize.js"></script>
    <style>
      html,body{margin:0;padding:0;width:100%;height:100vh;background:#0d0d1a;overflow:hidden;display:flex;justify-content:center;align-items:center;}
      .cv-wrap{position:relative;width:min(100%,800px);aspect-ratio:800/600;}
      #myWebGLCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
      #myImageCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;}
    </style>
  </head>
  <body onload="main();">
    <div class="cv-wrap">
      <canvas id="myWebGLCanvas" width="800" height="600"></canvas>
      <canvas id="myImageCanvas" width="800" height="600"></canvas>
    </div>
  </body>
</html>
